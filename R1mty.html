<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Metal Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Базовые цвета */
        :root {
            --bg-color: #080808;
            --text-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 1. КАСТОМНАЯ ПОЛОСА ПРОКРУТКИ (чтобы не белая, а в стиле сайта) */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb {
            background: #27272a; 
            border: 1px solid #39ff14; /* Зеленый ободок */
        }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 2. КОСМИЧЕСКИЙ ФОН (звезды) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 130px 80px, #fff, transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.7), transparent);
            background-size: 200px 200px;
            animation: twinkle 5s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Главный контейнер */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            width: 100%;
            max-width: 900px;
            z-index: 1;
        }

        /* ============================
           RGB АНИМАЦИЯ (Белый -> Красный -> Зеленый)
           ============================ */
        @keyframes rgbBorderGlow {
            0% { border-color: #ffffff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
            33% { border-color: #ff2a2a; box-shadow: 0 0 30px rgba(255, 42, 42, 0.8); }
            66% { border-color: #39ff14; box-shadow: 0 0 30px rgba(57, 255, 20, 0.8); }
            100% { border-color: #ffffff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
        }
        @keyframes rgbImageGlow {
            0% { filter: drop-shadow(0 0 15px #ffffff) drop-shadow(0 0 30px #ffffff); }
            33% { filter: drop-shadow(0 0 20px #ff2a2a) drop-shadow(0 0 40px #ff2a2a); }
            66% { filter: drop-shadow(0 0 20px #39ff14) drop-shadow(0 0 40px #39ff14); }
            100% { filter: drop-shadow(0 0 15px #ffffff) drop-shadow(0 0 30px #ffffff); }
        }

        /* 1. Девушка с крыльями */
        .avatar-section {
            width: 280px; height: 280px;
            border: 1px solid #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: #111;
            animation: rgbBorderGlow 8s linear infinite;
        }
        .avatar-section img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* 2. Логотип */
        .logo-section {
            width: 100%; max-width: 600px;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-section img {
            max-width: 100%; height: auto; max-height: 70px;
            object-fit: contain;
            animation: rgbImageGlow 8s linear infinite;
        }

        /* 3. Три квадрата */
        .grid-cards {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 25px; width: 100%; max-width: 850px;
        }

        .card {
            aspect-ratio: 1 / 1;
            border: 1px solid #fff;
            background-color: #080808;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-decoration: none;
            position: relative; transition: all 0.3s ease; overflow: hidden;
            animation: rgbBorderGlow 8s linear infinite;
        }
        .grid-cards .card:nth-child(2) { animation-delay: 2.6s; }
        .grid-cards .card:nth-child(3) { animation-delay: 5.2s; }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* Заглушка, если фото не загрузилось */
        .card .placeholder-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 700; font-size: 28px; letter-spacing: 1px;
            text-transform: uppercase; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            z-index: 2;
        }

        .card-title {
            position: absolute; bottom: 12%;
            font-family: 'Inter', sans-serif; font-size: 24px;
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.95);
            pointer-events: none; transition: color 0.3s ease;
            z-index: 2;
        }

        .card:hover { transform: translateY(-5px) scale(1.02); z-index: 10; }
        .card:hover img { transform: scale(1.05); }
        .card:hover .card-title { color: #fff; text-shadow: 0 0 20px #fff; }

        @media (max-width: 768px) {
            .grid-cards { grid-template-columns: 1fr; max-width: 320px; }
            .avatar-section { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- 1. ДЕВУШКА (Загрузи сюда файл images/avatar.jpg) -->
        <div class="avatar-section">
            <img src="images/avatar.jpg" alt="Avatar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22280%22%3E%3Crect width=%22280%22 height=%22280%22 fill=%22%23111%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-family=%22sans-serif%22 font-size=%2230%22 fill=%22white%22 text-anchor=%22middle%22 dy=%22.3em%22%3EАРТ%3C/text%3E%3C/svg%3E'">
        </div>

        <!-- 2. ЛОГОТИП (Загрузи сюда файл images/logo.png) -->
        <div class="logo-section">
            <img src="images/logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='&lt;span style=&quot;font-size:48px;font-weight:700;letter-spacing:5px;color:%23fff;&quot;&gt;BLACK HUB&lt;/span&gt;'">
        </div>

        <!-- 3. ТРИ ИГРЫ (Загрузи картинки: dota.jpg, cyber.jpg, win.jpg) -->
        <div class="grid-cards">
            
            <a href="#" class="card">
                <img src="images/dota.jpg" alt="Dota 2" onerror="this.style.display='none'">
                <div class="placeholder-text">DOTA 2</div>
                <div class="card-title">Dota 2</div>
            </a>

            <a href="#" class="card">
                <img src="images/cyber.jpg" alt="Cyberpunk" onerror="this.style.display='none'">
                <div class="placeholder-text">CYBERPUNK</div>
                <div class="card-title">Cyberpunk</div>
            </a>

            <a href="#" class="card">
                <img src="images/win.jpg" alt="Windows" onerror="this.style.display='none'">
                <div class="placeholder-text">WINDOWS</div>
                <div class="card-title">Windows</div>
            </a>

        </div>

    </div>

</body>
</html>
