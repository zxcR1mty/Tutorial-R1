<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Metal Hub</title>
    <!-- ЗАМЕНА ШРИФТОВ: Orbitron для заголовков, Inter для текста -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #080808; --text-white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #27272a; border: 1px solid #39ff14; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        body {
            background-color: #080808;
            background-image: url('image/fon.jpg');
            background-size: cover; background-position: center;
            background-repeat: no-repeat; background-attachment: fixed;
            color: var(--text-white); 
            /* Основной текст использует Inter */
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 40px 20px; position: relative; overflow-x: hidden;
            align-content: center; 
        }

        .main-container { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 40px; width: 100%; max-width: 800px; z-index: 1; 
        }

        @keyframes rgbBorderGlow {
            0% { border-color: rgba(255, 255, 255, 0.8); box-shadow: 0 0 15px rgba(255, 255, 255, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.2); }
            33% { border-color: #ff2a2a; box-shadow: 0 0 25px rgba(255, 42, 42, 0.7), inset 0 0 15px rgba(255, 42, 42, 0.3); }
            66% { border-color: #39ff14; box-shadow: 0 0 25px rgba(57, 255, 20, 0.7), inset 0 0 15px rgba(57, 255, 20, 0.3); }
            100% { border-color: rgba(255, 255, 255, 0.8); box-shadow: 0 0 15px rgba(255, 255, 255, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.2); }
        }

        .glass-block {
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        /* Блок создателя */
        .creator-block {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding: 25px 35px 20px 35px; gap: 12px;
            border-radius: 2px;
            animation: rgbBorderGlow 8s linear infinite;
        }
        .creator-block:hover { transform: translateY(-2px) scale(1.02); background: rgba(15, 15, 15, 0.7); }
        
        .creator-avatar { width: 95px; height: 95px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }
        .creator-info { display: flex; flex-direction: column; gap: 8px; }
        .creator-info h3 { 
            font-family: 'Orbitron', sans-serif; /* ЗАМЕНА ШРИФТА НА СТИЛЬНЫЙ */
            font-size: 20px; letter-spacing: 3px; font-weight: 700; 
        }
        .creator-links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .social-btn { display: flex; align-items: center; gap: 6px; color: #a1a1aa; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .social-btn:hover { color: #fff; text-shadow: 0 0 10px #fff; }
        .social-btn i { font-size: 16px; }

        .grid-cards { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; 
            margin-top: 150px; 
        }
        
        .card { 
            aspect-ratio: 1 / 1; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-decoration: none; position: relative; overflow: hidden; 
            border-radius: 2px;
            animation: rgbBorderGlow 8s linear infinite;
        }
        .grid-cards .card:nth-child(2) { animation-delay: 2.6s; }
        .grid-cards .card:nth-child(3) { animation-delay: 5.2s; }
        
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        
        .card .placeholder-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-family: 'Orbitron', sans-serif; /* ЗАМЕНА ШРИФТА */
            font-weight: 700; font-size: 26px; letter-spacing: 3px; text-transform: uppercase; 
            color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.9); z-index: 2; 
        }
        .card-title { 
            position: absolute; bottom: 12%; 
            font-family: 'Orbitron', sans-serif; /* ЗАМЕНА ШРИФТА */
            font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; 
            color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.95); pointer-events: none; transition: color 0.3s ease; z-index: 2; 
        }
        
        .card:hover { transform: translateY(-5px) scale(1.03); z-index: 10; background: rgba(20, 20, 20, 0.7); }
        .card:hover img { transform: scale(1.08); }
        .card:hover .card-title { color: #fff; text-shadow: 0 0 25px #fff; }

        @media (max-width: 768px) { 
            .grid-cards { grid-template-columns: 1fr; max-width: 280px; margin-top: 80px; } 
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- 1. Блок создателя -->
        <div class="creator-block glass-block">
            <img src="image/R1mty.jpg" alt="Creator" class="creator-avatar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2295%22 height=%2295%22%3E%3Crect width=%2295%22 height=%2295%22 fill=%22%23333%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-family=%22sans-serif%22 font-size=%2220%22 fill=%22white%22 text-anchor=%22middle%22 dy=%22.3em%22%3ER1%3C/text%3E%3C/svg%3E'">
            
            <div class="creator-info">
                <h3>CREATOR</h3>
                <div class="creator-links">
                    <a href="https://t.me/tiredR1mty" target="_blank" class="social-btn">
                        <i class="fa-brands fa-telegram"></i> @tiredR1mty
                    </a>
                    <a href="https://github.com/zxcR1mty" target="_blank" class="social-btn">
                        <i class="fa-brands fa-github"></i> zxcR1mty
                    </a>
                </div>
            </div>
        </div>

        <!-- 2. Три игры -->
        <div class="grid-cards">
            <a href="#" class="card glass-block">
                <img src="image/dota.jpg" alt="Dota 2" onerror="this.style.display='none'">
                <div class="placeholder-text">DOTA 2</div>
                <div class="card-title">Dota 2</div>
            </a>
            <a href="#" class="card glass-block">
                <img src="image/cyber.jpg" alt="Cyberpunk" onerror="this.style.display='none'">
                <div class="placeholder-text">CYBERPUNK</div>
                <div class="card-title">Cyberpunk</div>
            </a>
            <a href="#" class="card glass-block">
                <img src="image/win.jpg" alt="Windows" onerror="this.style.display='none'">
                <div class="placeholder-text">WINDOWS</div>
                <div class="card-title">Windows</div>
            </a>
        </div>

    </div>

</body>
</html>
